<style>
        body {
            background-color: #f5fafd; /* Updated to Background token */
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-editorial {
            border: none;
            border-bottom: 1.5px solid #bdc8cf;
            background: transparent;
            transition: border-color 0.3s ease;
            padding-left: 0;
            padding-right: 0;
        }
        .input-editorial:focus {
            outline: none;
            box-shadow: none;
            border-color: #006782; /* Primary Teal */
        }
        .login-card {
            border: 1px solid #003a4a; /* On-Primary-Container (Deep Teal) */
        }
        .editorial-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        /* --- Editorial Hover Systems --- */
        
        /* Primary Button Lift & Color Deepening */
        .btn-editorial-primary {
            transition: transform 0.15s ease-in-out, background-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            position: relative;
            overflow: hidden;
        }
        .btn-editorial-primary:hover {
            transform: translateY(-2px);
            background-color: #004d62; /* on-primary-fixed-variant */
            box-shadow: 0 4px 12px rgba(0, 103, 130, 0.2);
        }
        .btn-editorial-primary:active {
            transform: translateY(0);
        }

        /* Underline Reveal Animation (for top bar/nav links) */
        .nav-link-editorial {
            position: relative;
            transition: color 0.15s ease-in-out;
        }
        .nav-link-editorial::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 1px;
            background-color: #006782; /* Primary Teal */
            transition: width 0.15s ease-in-out, left 0.15s ease-in-out;
        }
        .nav-link-editorial:hover::after {
            width: 100%;
            left: 0;
        }

        /* Reduced Motion Respect */
        @media (prefers-reduced-motion: reduce) {
            .btn-editorial-primary, .nav-link-editorial::after, .animate-fade-in, .login-card {
                animation: none !important;
                transition: none !important;
                transform: none !important;
            }
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-0 bg-background">
<!-- Login Container -->
<main class="w-full md:w-[400px] animate-fade-in">
<!-- Login Card -->
<div class="login-card bg-surface editorial-shadow rounded-none p-8 md:p-12 flex flex-col">
<!-- Logo Section -->
<header class="mb-12 flex flex-col items-center text-center">
<h1 class="font-fraunces text-[42px] leading-tight text-primary font-black tracking-tight mb-2">
                    Hydronix
                </h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">
                    Mission Control
                </p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-8" onsubmit="event.preventDefault();">
<!-- Username -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant/70 block mb-1" for="username">
                        Operator ID
                    </label>
<input class="input-editorial w-full font-body-md text-body-md text-on-surface placeholder-outline-variant/50 focus:placeholder-transparent" id="username" name="username" placeholder="e.g. ALPHA-9" type="text"/>
</div>
<!-- Password -->
<div class="relative group">
<div class="flex justify-between items-end mb-1">
<label class="font-label-sm text-label-sm text-on-surface-variant/70 block" for="password">
                            Authorization Key
                        </label>
<button class="nav-link-editorial text-[10px] uppercase font-bold text-primary hover:text-on-primary-container" type="button">
                            Forgot?
                        </button>
</div>
<input class="input-editorial w-full font-body-md text-body-md text-on-surface placeholder-outline-variant/50 focus:placeholder-transparent" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 py-2">
<input class="w-4 h-4 border-outline-variant text-primary focus:ring-primary rounded-none cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-md text-[14px] text-on-surface-variant cursor-pointer" for="remember">
                        Persistent Session
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="btn-editorial-primary w-full bg-primary text-on-primary font-fraunces text-title-md py-4 focus:ring-2 focus:ring-offset-2 focus:ring-primary" onclick="window.location.href='{{DATA:SCREEN:SCREEN_14}}'" type="submit">
                        Access Dashboard
                    </button>
</div>
</form>
<!-- Footer Meta -->
<footer class="mt-12 text-center">
<div class="flex items-center justify-center space-x-2 mb-6">
<span class="w-2 h-2 bg-status-nominal rounded-full"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant/60">System Status: Nominal</span>
</div>
<p class="font-body-md text-[13px] text-on-surface-variant/50">
                    Proprietary Environmental Monitoring Network.<br/>
                    Unauthorized access is strictly monitored.
                </p>
</footer>
</div>
<!-- External Links -->
<div class="mt-6 flex justify-between px-2 text-[12px] font-label-sm uppercase tracking-widest text-on-surface-variant/40">
<a class="nav-link-editorial hover:text-primary" href="{{DATA:SCREEN:SCREEN_5}}">Infrastructure Documentation</a>
<a class="nav-link-editorial hover:text-primary" href="{{DATA:SCREEN:SCREEN_2}}">Request Access</a>
</div>
</main>
<!-- Micro-interaction Background Script -->
<script>
        // Subtle background movement based on mouse
        document.addEventListener('mousemove', (e) => {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            
            const moveX = (e.clientX - window.innerWidth / 2) / 150;
            const moveY = (e.clientY - window.innerHeight / 2) / 150;
            
            const card = document.querySelector('.login-card');
            if (card) {
                card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Basic password toggle functionality
        const toggleBtn = document.querySelector('.material-symbols-outlined');
        const passInput = document.getElementById('password');
        
        toggleBtn?.addEventListener('click', () => {
            const isPassword = passInput.type === 'password';
            passInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
