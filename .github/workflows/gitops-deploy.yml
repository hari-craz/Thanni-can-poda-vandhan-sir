name: GitOps Portainer Deployment

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend quick import test
        run: |
          python -c "import sys; import importlib; importlib.import_module('backend.app.main')"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hydronix-backend:latest
            ghcr.io/${{ github.repository_owner }}/hydronix-backend:${{ github.sha }}

      - name: Build and push ml-service image
        uses: docker/build-push-action@v4
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hydronix-ml-service:latest
            ghcr.io/${{ github.repository_owner }}/hydronix-ml-service:${{ github.sha }}

      - name: Trigger Portainer Stack Redeployment
        run: |
          if [ -n "${{ secrets.PORTAINER_WEBHOOK_URL }}" ]; then
            echo "Triggering Portainer Stack Webhook..."
            curl -X POST -f "${{ secrets.PORTAINER_WEBHOOK_URL }}"
          else
            echo "Warning: PORTAINER_WEBHOOK_URL is not configured in GitHub Secrets. Skipping Portainer trigger."
          fi
