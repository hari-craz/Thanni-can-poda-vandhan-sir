name: Auto-tag model version

on:
  push:
    paths:
      - 'ML-Model/models/**'

jobs:
  tag-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check last commit message
        id: lastmsg
        run: |
          echo "last=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Exit if auto-bump commit
        if: contains(steps.lastmsg.outputs.last, 'auto-bump-model-version')
        run: |
          echo "Already an auto-bump commit; exiting." 

      - name: Determine new model version
        id: ver
        run: |
          ts=$(date -u +%Y%m%d%H%M%S)
          echo "version=$ts" >> $GITHUB_OUTPUT

      - name: Update MODEL_VERSION
        run: |
          echo "${{ steps.ver.outputs.version }}" > ML-Model/models/MODEL_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ML-Model/models/MODEL_VERSION
          git commit -m "auto-bump-model-version: ${{ steps.ver.outputs.version }}"
          git tag -a "model-${{ steps.ver.outputs.version }}" -m "model ${{ steps.ver.outputs.version }}"
          git push origin HEAD:main
          git push origin --tags
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
