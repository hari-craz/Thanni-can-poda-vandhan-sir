services:
  db:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hydronix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hydronix_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hydronix_db}
    ports:
      - "10017:5432"
    volumes:
      - "${DB_STORAGE:-D:/New folder/db}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hydronix} -d $${POSTGRES_DB:-hydronix_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "10016:6379"
    volumes:
      - "${REDIS_STORAGE:-D:/New folder/redis}:/data"

  ml-service:
    build: ./ml-service
    image: ghcr.io/hari-craz/hydronix-ml-service:latest
    restart: unless-stopped
    ports:
      - "10019:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-"hydronix_local_key"}
    volumes:
      - ./ML-Model/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    image: ghcr.io/hari-craz/hydronix-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "10020:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-hydronix}:${POSTGRES_PASSWORD:-hydronix_pass}@db:5432/${POSTGRES_DB:-hydronix_db}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-"hydronix_local_key"}
      ML_SERVICE_ENABLED: "true"
      REPORTS_STORAGE: "/storage/hydronix/reports"
      UPLOAD_STORAGE: "/storage/hydronix/uploads"
      LOG_STORAGE: "/storage/hydronix/logs"
      BACKUP_STORAGE: "/storage/hydronix/backups"
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@hydronix.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-superadmin}
    volumes:
      - ./ML-Model/models:/app/models:ro
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - "${REPORTS_STORAGE:-D:/New folder/reports}:/storage/hydronix/reports"
      - "${UPLOAD_STORAGE:-D:/New folder/uploads}:/storage/hydronix/uploads"
      - "${LOG_STORAGE:-D:/New folder/logs}:/storage/hydronix/logs"
      - "${BACKUP_STORAGE:-D:/New folder/backups}:/storage/hydronix/backups"
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.2
    ports:
      - "10021:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "10018:80"
    depends_on:
      backend:
        condition: service_healthy

