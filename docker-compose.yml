version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: hydronix
      POSTGRES_PASSWORD: hydronix_pass
      POSTGRES_DB: hydronix_db
    ports:
      - "10017:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "10016:6379"
    volumes:
      - redis_data:/data

  ml-service:
    build: ./ml-service
    image: ghcr.io/hari-craz/hydronix-ml-service:latest
    ports:
      - "10019:8000"
    depends_on:
      - db
    environment:
      ML_SERVICE_API_KEY: "hydronix_local_key"
    volumes:
      - ./ML-Model/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    image: ghcr.io/hari-craz/hydronix-backend:latest
    depends_on:
      - db
      - ml-service
      - redis
    ports:
      - "10020:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://hydronix:hydronix_pass@db:5432/hydronix_db
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_API_KEY: "hydronix_local_key"
      ML_SERVICE_ENABLED: "true"
    volumes:
      - ./ML-Model/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.2
    ports:
      - "10021:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: always

volumes:
  db_data:
  redis_data:
