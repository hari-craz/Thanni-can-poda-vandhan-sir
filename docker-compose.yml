version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: hydronix
      POSTGRES_PASSWORD: hydronix_pass
      POSTGRES_DB: hydronix_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mqtt:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/config:/mosquitto/config:ro
      - mqtt_data:/mosquitto/data

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      ML_SERVICE_API_KEY: "hydronix_local_key"
    volumes:
      - ./ML-Model/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    depends_on:
      - db
      - ml-service
      - redis
      - mqtt
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://hydronix:hydronix_pass@db:5432/hydronix_db
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_API_KEY: "hydronix_local_key"
    volumes:
      - ./ML-Model/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws/updates
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev"]

volumes:
  db_data:
